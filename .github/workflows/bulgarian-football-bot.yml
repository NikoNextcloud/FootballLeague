name: Bulgarian football bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: bulgarian-football-bot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Bulgarian football data
        run: python scripts/bulgarian_football_bot.py
      - name: Commit refreshed Bulgarian football data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/bulgarian-football.json
          git diff --cached --quiet || git commit -m "Update Bulgarian football data"
          git push
