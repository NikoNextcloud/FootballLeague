name: Update league data

on:
  schedule:
    # На всеки 20 минути (UTC) — достатъчно често за резултати в реално време
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Снимка на предишните данни (за известията)
        run: cp public/data/league.json /tmp/league-before.json

      - name: Fetch latest league data
        env:
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
        run: node scripts/fetch-data.mjs

      - name: Push известия за начало на мач / гол
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node scripts/notify.mjs

      - name: Обновяване на голмайсторите
        env:
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
        run: node scripts/fetch-scorers.mjs

      - name: Commit if changed
        run: |
          git config user.name "a-grupa-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/league.json public/data/scorers.json public/data/scorers-cache.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: обновени данни за лигата"
            git push
          else
            echo "Няма промени в данните."
          fi
