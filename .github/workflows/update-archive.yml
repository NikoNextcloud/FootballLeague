name: Update archive (previous seasons)

on:
  workflow_dispatch: {}
  schedule:
    # Веднъж месечно е достатъчно — старите сезони не се променят
    - cron: "0 3 1 * *"

permissions:
  contents: write

jobs:
  update-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch archive
        env:
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
        run: node scripts/fetch-archive.mjs 4

      - name: Commit if changed
        run: |
          git config user.name "a-grupa-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/archive
          if ! git diff --cached --quiet; then
            git commit -m "chore: обновен архив от сезони"
            git push
          else
            echo "Няма промени в архива."
          fi
