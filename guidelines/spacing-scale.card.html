<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing Scale" subtitle="2–26px literal steps used across the app" -->
<!doctype html>
<html><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text-secondary); font-family: var(--font-sans); padding: 16px; font-size: 11px; }
  .row { display: flex; align-items: flex-end; gap: 10px; }
  .bar { background: var(--accent-primary); border-radius: 2px; }
</style>
</head>
<body>
<div class="row">
  <div><div class="bar" style="width: 14px; height: var(--space-1)"></div><div>2</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-2)"></div><div>4</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-3)"></div><div>6</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-4)"></div><div>8</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-5)"></div><div>10</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-6)"></div><div>12</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-7)"></div><div>14</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-8)"></div><div>16</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-9)"></div><div>20</div></div>
  <div><div class="bar" style="width: 14px; height: var(--space-10)"></div><div>26</div></div>
</div>
</body></html>
