<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & Surfaces" subtitle="Deep navy-black page, translucent glass cards" -->
<!doctype html>
<html><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); }
  .row { display: flex; gap: 14px; padding: 16px; }
  .sw { flex: 1; height: 100px; border-radius: 10px; display: flex; align-items: flex-end; padding: 8px; font-size: 12px; font-weight: 700; color: var(--text-primary); }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background: var(--surface-page); border: 1px solid var(--surface-card-border)">surface-page<br>#0b0f16</div>
  <div class="sw" style="background: var(--surface-elevated); border: 1px solid var(--surface-card-border)">surface-elevated<br>#131a24</div>
  <div class="sw" style="background: var(--surface-card); border: 1px solid var(--surface-card-border); backdrop-filter: blur(6px);">surface-card<br>rgba(255,255,255,.045)</div>
  <div class="sw" style="background: var(--surface-page); color: var(--text-secondary); border: 1px solid var(--surface-card-border)">text-secondary<br>#9aa6b8</div>
</div>
</body></html>
