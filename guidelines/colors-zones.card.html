<!-- @dsCard group="Colors" viewport="700x180" name="Standings Zones" subtitle="Champion / Europe / relegation banding" -->
<!doctype html>
<html><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-page); color: var(--text-primary); }
  .wrap { padding: 16px; }
  .r { display: flex; align-items: center; gap: 10px; padding: 8px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .rank { width: 22px; font-weight: 800; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="wrap">
  <div class="r" style="box-shadow: inset 3px 0 0 var(--zone-title)"><span class="rank">1</span>Лудогорец — зона за шампион (gold)</div>
  <div class="r" style="box-shadow: inset 3px 0 0 var(--zone-europe)"><span class="rank">4</span>Славия — плейоф за титла/Европа (blue)</div>
  <div class="r" style="box-shadow: inset 3px 0 0 var(--zone-relegation)"><span class="rank">14</span>Септември София — плейоф за оставане (red)</div>
</div>
</body></html>
