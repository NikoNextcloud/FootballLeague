<!doctype html>
<html><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .demo {
    height: 130px;
    background:
      radial-gradient(600px 300px at 10% -20%, var(--c-glow-blue), transparent 60%),
      radial-gradient(450px 250px at 100% 0%, var(--c-glow-green), transparent 55%),
      var(--surface-page);
    display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 13px;
  }
</style>
</head>
<body>
<div class="demo">radial-gradient blue (top-left) + green (top-right) over --surface-page</div>
</body></html>
