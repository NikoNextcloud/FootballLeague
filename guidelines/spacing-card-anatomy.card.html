<!-- @dsCard group="Spacing" viewport="700x160" name="Card Anatomy" subtitle="Glass card: translucent fill, hairline border, blur, 14px radius" -->
<!doctype html>
<html><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text-primary); font-family: var(--font-sans); padding: 20px; }
  .card {
    background: var(--surface-card);
    border: 1px solid var(--surface-card-border);
    border-radius: var(--radius-xl);
    backdrop-filter: blur(6px);
    padding: 14px;
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 340px;
  }
</style>
</head>
<body>
<div class="card">background: rgba(255,255,255,.045)<br>border: 1px solid rgba(255,255,255,.08)<br>border-radius: 14px · backdrop-filter: blur(6px)<br>no drop shadow — depth comes from blur + translucency only</div>
</body></html>
