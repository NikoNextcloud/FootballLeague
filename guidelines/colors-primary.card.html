<!doctype html>
<html><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; padding: 16px; }
  .sw { flex: 1; height: 90px; border-radius: 10px; display: flex; align-items: flex-end; padding: 8px; color: #04121a; font-size: 12px; font-weight: 700; }
  .light { color: #eef1f6; }
</style>
</head>
<body>
<div class="row">
  <div class="sw" style="background: var(--accent-primary)">accent-primary<br>#22c55e</div>
  <div class="sw light" style="background: var(--accent-link)">accent-link<br>#3b82f6</div>
  <div class="sw" style="background: var(--status-highlight)">status-highlight<br>#f5b942</div>
  <div class="sw light" style="background: var(--status-danger)">status-danger<br>#ef4444</div>
</div>
</body></html>
