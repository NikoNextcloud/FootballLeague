<!-- @dsCard group="Spacing" viewport="700x140" name="Corner Radius" subtitle="6 / 10 / 12 / 14 / pill — no sharp corners in this UI" -->
<!doctype html>
<html><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); color: var(--text-secondary); font-family: var(--font-sans); padding: 16px; font-size: 11px; }
  .row { display: flex; gap: 14px; }
  .box { width: 90px; height: 60px; background: var(--surface-card); border: 1px solid var(--surface-card-border); display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="row">
  <div><div class="box" style="border-radius: var(--radius-sm)"></div><div>sm 6px (badge)</div></div>
  <div><div class="box" style="border-radius: var(--radius-md)"></div><div>md 10px (chip)</div></div>
  <div><div class="box" style="border-radius: var(--radius-lg)"></div><div>lg 12px (stat)</div></div>
  <div><div class="box" style="border-radius: var(--radius-xl)"></div><div>xl 14px (card)</div></div>
  <div><div class="box" style="border-radius: var(--radius-pill)"></div><div>pill (filter)</div></div>
</div>
</body></html>
